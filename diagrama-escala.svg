<svg viewBox="0 0 740 270" xmlns="http://www.w3.org/2000/svg">

  <!-- Fundo -->
  <rect width="740" height="270" fill="#140a02" rx="6"/>

  <!-- ── BRAÇO DO VIOLÃO ── -->
  <!-- Corpo do braço (trapézio — mais largo no encontro com o corpo) -->
  <path d="M65,97 L655,90 L655,160 L65,152 Z" fill="#1c3045" opacity="0.65"/>
  <path d="M65,97 L655,90 L655,160 L65,152 Z" fill="none" stroke="#4a7a9a" stroke-width="1.5"/>

  <!-- Corpo do violão (parcial, à direita) -->
  <path d="M655,90 C685,84 715,95 718,125 C715,155 685,166 655,160" fill="#1c3045" opacity="0.5"/>
  <path d="M655,90 C685,84 715,95 718,125 C715,155 685,166 655,160" fill="none" stroke="#4a7a9a" stroke-width="1.5"/>

  <!-- Boca do violão -->
  <circle cx="695" cy="125" r="20" fill="#0a0604" stroke="#4a7a9a" stroke-width="1" opacity="0.9"/>

  <!-- ── CORDAS (6 cordas, levemente inclinadas) ── -->
  <line x1="65" y1="107" x2="655" y2="100" stroke="#e0d0a0" stroke-width="0.6" opacity="0.22"/>
  <line x1="65" y1="114" x2="655" y2="107" stroke="#e0d0a0" stroke-width="0.7" opacity="0.22"/>
  <line x1="65" y1="121" x2="655" y2="114" stroke="#e0d0a0" stroke-width="0.9" opacity="0.22"/>
  <line x1="65" y1="128" x2="655" y2="121" stroke="#e0d0a0" stroke-width="1.1" opacity="0.22"/>
  <line x1="65" y1="135" x2="655" y2="128" stroke="#e0d0a0" stroke-width="1.3" opacity="0.22"/>
  <line x1="65" y1="142" x2="655" y2="135" stroke="#e0d0a0" stroke-width="1.6" opacity="0.22"/>

  <!-- ── TRASTES (pré-12º) ── -->
  <line x1="98"  y1="96" x2="98"  y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>
  <line x1="129" y1="96" x2="129" y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>
  <line x1="159" y1="95" x2="159" y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>
  <line x1="187" y1="95" x2="187" y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>
  <line x1="213" y1="95" x2="213" y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>
  <line x1="238" y1="95" x2="238" y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>
  <line x1="261" y1="94" x2="261" y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>
  <line x1="283" y1="94" x2="283" y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>
  <line x1="304" y1="94" x2="304" y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>
  <line x1="324" y1="93" x2="324" y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>
  <line x1="343" y1="93" x2="343" y2="153" stroke="#c8b878" stroke-width="1.5" opacity="0.45"/>

  <!-- ── 12º TRASTE (destaque dourado) ── -->
  <line x1="360" y1="88" x2="360" y2="163" stroke="#c9a848" stroke-width="4"/>
  <!-- Marcações de posição (dois pontos) -->
  <circle cx="360" cy="117" r="4.5" fill="#c9a848" opacity="0.85"/>
  <circle cx="360" cy="133" r="4.5" fill="#c9a848" opacity="0.85"/>

  <!-- ── TRASTES (pós-12º) ── -->
  <line x1="377" y1="92" x2="377" y2="157" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="392" y1="92" x2="392" y2="157" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="407" y1="92" x2="407" y2="157" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="421" y1="91" x2="421" y2="158" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="435" y1="91" x2="435" y2="158" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="448" y1="91" x2="448" y2="158" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="460" y1="91" x2="460" y2="159" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="472" y1="91" x2="472" y2="159" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="483" y1="90" x2="483" y2="159" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="494" y1="90" x2="494" y2="160" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="505" y1="90" x2="505" y2="160" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>
  <line x1="515" y1="90" x2="515" y2="160" stroke="#c8b878" stroke-width="1.5" opacity="0.35"/>

  <!-- ── PESTANA ── -->
  <rect x="59" y="94" width="8" height="61" fill="#c9a848" rx="1.5"/>

  <!-- ── PONTE / CAVALETE ── -->
  <rect x="649" y="87" width="8" height="76" fill="#c9a848" rx="1.5"/>

  <!-- ── LINHAS GUIA TRACEJADAS ── -->
  <line x1="63"  y1="94" x2="63"  y2="26" stroke="#c9a848" stroke-width="1" stroke-dasharray="4,3" opacity="0.45"/>
  <line x1="360" y1="88" x2="360" y2="56" stroke="#c9a848" stroke-width="1" stroke-dasharray="4,3" opacity="0.45"/>
  <line x1="653" y1="87" x2="653" y2="26" stroke="#e0c070" stroke-width="1" stroke-dasharray="4,3" opacity="0.45"/>

  <!-- ── SETA x (Pestana → 12º Traste) ── -->
  <line x1="63" y1="62" x2="360" y2="62" stroke="#c9a848" stroke-width="1.8"/>
  <polygon points="63,62 74,57 74,67"  fill="#c9a848"/>
  <polygon points="360,62 349,57 349,67" fill="#c9a848"/>
  <text x="211" y="54" text-anchor="middle" font-family="Raleway,sans-serif" font-size="12" font-weight="700" fill="#c9a848">
    x = Escala ÷ 2
  </text>

  <!-- ── SETA 2x (Pestana → Ponte) ── -->
  <line x1="63" y1="30" x2="653" y2="30" stroke="#e0c070" stroke-width="1.8"/>
  <polygon points="63,30 74,25 74,35"  fill="#e0c070"/>
  <polygon points="653,30 642,25 642,35" fill="#e0c070"/>
  <text x="358" y="22" text-anchor="middle" font-family="Raleway,sans-serif" font-size="12" font-weight="700" fill="#e0c070">
    Escala Total (L) = 2x
  </text>

  <!-- ── RÓTULOS INFERIORES ── -->

  <!-- Pestana -->
  <line x1="63" y1="157" x2="63" y2="176" stroke="#f0e4c8" stroke-width="1" opacity="0.35"/>
  <text x="63" y="192" text-anchor="middle" font-family="Raleway,sans-serif" font-size="12" font-weight="600" fill="#f0e4c8">Pestana</text>
  <text x="63" y="206" text-anchor="middle" font-family="Raleway,sans-serif" font-size="10" fill="#f0e4c8" opacity="0.5">(nut)</text>

  <!-- 12º Traste -->
  <line x1="360" y1="164" x2="360" y2="176" stroke="#c9a848" stroke-width="1" opacity="0.6"/>
  <text x="360" y="192" text-anchor="middle" font-family="Raleway,sans-serif" font-size="12" font-weight="700" fill="#c9a848">12º Traste</text>
  <text x="360" y="206" text-anchor="middle" font-family="Raleway,sans-serif" font-size="10" fill="#c9a848" opacity="0.75">ponto da oitava</text>

  <!-- Ponte -->
  <line x1="653" y1="165" x2="653" y2="176" stroke="#f0e4c8" stroke-width="1" opacity="0.35"/>
  <text x="653" y="192" text-anchor="middle" font-family="Raleway,sans-serif" font-size="12" font-weight="600" fill="#f0e4c8">Ponte</text>
  <text x="653" y="206" text-anchor="middle" font-family="Raleway,sans-serif" font-size="10" fill="#f0e4c8" opacity="0.5">(cavalete)</text>

  <!-- ── FÓRMULA (rodapé do diagrama) ── -->
  <text x="370" y="240" text-anchor="middle" font-family="Raleway,sans-serif" font-size="11" fill="#f0e4c8" opacity="0.5">
    <tspan>Posição do traste n :  d(n) = L − L ÷ 2</tspan><tspan dy="-4" font-size="8">n/12</tspan><tspan dy="4">     →     12º traste: d(12) = L ÷ 2 = x</tspan>
  </text>

</svg>
