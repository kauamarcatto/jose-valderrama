<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculador de Trastes — José Valderrama</title>

  <!-- Aqui linkamos o arquivo CSS externo -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <header>
    <h1>Calculador de Trastes</h1>
    <p>Calcule a posição exata dos trastes do seu instrumento</p>
  </header>

  <main>
    <section>
      <h2>Cálculo de Trastes</h2>
      <p>Informe a escala (mm). Ex.: 650</p>

      <label for="escala">Escala (em milímetros)</label>
      <input
        type="number"
        id="escala"
        placeholder="Ex.: 650"
        value="650"
        min="1"
      />

      <button onclick="calcular()">CALCULAR</button>
    </section>

    <section id="resultado">
      <!-- Preenchido pelo JavaScript após clicar em CALCULAR -->
    </section>
  </main>

  <footer>
    <p>José Valderrama — Lutheria Artesanal</p>
  </footer>

  <!-- Aqui linkamos o arquivo JavaScript externo -->
  <!-- Fica no final do body para o HTML carregar antes do JS rodar -->
  <script src="script.js"></script>

</body>
</html>
